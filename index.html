<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Howard AI Newsroom</title>

  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="../assets/style.css" />
</head>

<body>

  <header>
    <div class="container navbar">

      <a href="../index.html" class="logo">
        <img src="../logo-light.png" alt="Howard AI Logo">
      </a>

      <nav class="main-nav">

        <div class="nav-item">
          <a href="#">About</a>

          <div class="dropdown">
            <a href="./index.html">Overview</a>
            <a href="./howardai.html">Howard AI</a>
            <a href="./leadership.html">Leadership</a>
            <a href="./newsroom.html">Newsroom</a>
            <a href="./investors.html">Investors</a>
          </div>
        </div>

        <div class="nav-item">
          <a href="#">Store</a>

          <div class="dropdown">
            <a href="../store/index.html">All Products</a>
            <a href="../store/home.html">Howard Home</a>
            <a href="../store/pro.html">Howard Pro</a>
            <a href="../store/enterprise.html">Enterprise</a>
          </div>
        </div>

        <div class="nav-item">
          <a href="#">Support</a>

          <div class="dropdown">
            <a href="../support/index.html">Support Hub</a>
            <a href="../support/contact.html">Contact</a>
            <a href="../support/about-support.html">About Support</a>
            <a href="../support/faqs.html">FAQs</a>
          </div>
        </div>

      </nav>

    </div>
  </header>

  <section class="section">
    <div class="container">

      <div class="hero-tag">
        Howard AI Newsroom
      </div>

      <h1 class="section-title">
        Latest Updates
      </h1>

      <p class="section-subtitle">
        Product updates, launch milestones, Houston expansion news, and company announcements.
      </p>

      <div id="news-container" class="news-grid"></div>

    </div>
  </section>

  <script>
    async function loadNews() {
      try {

        const response = await fetch('./news.json');
        const articles = await response.json();

        const container = document.getElementById('news-container');

        articles.forEach(article => {

          const card = document.createElement('div');

          card.classList.add('news-card');

          card.innerHTML = `
            <div class="news-meta">${article.date}</div>
            <h2>${article.title}</h2>
            <p>${article.description}</p>
          `;

          container.appendChild(card);

        });

      } catch (error) {

        console.error(error);

        document.getElementById('news-container').innerHTML = `
          <div class="news-card">
            <h2>Error Loading News</h2>
            <p>Please try again later.</p>
          </div>
        `;
      }
    }

    loadNews();
  </script>

</body>
</html>
